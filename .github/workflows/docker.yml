name: Docker Build Pipeline

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Build Docker Image
        run: docker build -t mini-project ./04-Docker-Mini-Project

      - name: Verify Docker Image
        run: docker images | grep mini-project

      - name: Run Container
        run: |
          docker rm -f test-container || true
          docker run -d -p 8083:80 --name test-container mini-project

      - name: Test Application
      - run: curl -f http://localhost:8083 || exit 1

      - name: Debug project files
        run: ls -la ./04-Docker-Mini-Project
