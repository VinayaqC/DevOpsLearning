name: Docker Build Pipeline

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Build Docker Image
        run: docker build -t mini-project ./04-Docker-Mini-Project

      - name: List files
        run: ls -la ./04-Docker-Mini-Project
